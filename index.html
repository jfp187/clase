<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Test AR.js - Imagen en Marcador Hiro</title>
    
    <!-- Scripts estables para A-Frame y AR.js -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- Sistema de gestión de recursos para precargar la imagen de manera óptima -->
        <a-assets>
            <img id="banner" src="bienvenida.png">
        </a-assets>
        
        <!-- Definir el marcador de patrón 'hiro' -->
        <a-marker preset="hiro">
            
            <!-- Mostramos la imagen mapeada en un plano flotante -->
            <!-- 'rotation="-90 0 0"' la acuesta sobre el marcador -->
            <!-- 'width' y 'height' mantienen la proporción rectangular aproximada (4:3 o similar) -->
            <a-image 
                src="#banner" 
                position="0 0.2 0" 
                rotation="-90 0 0" 
                width="3" 
                height="2.1">
            </a-image>

        </a-marker>
        
        <!-- Definir la entidad cámara -->
        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
