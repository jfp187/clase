<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Taller AR - Versión Barcode</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .instructions {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            z-index: 100;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">
    <div class="instructions">
        🎯 <strong>Taller de Tecnología Inmersiva</strong><br>
        Apunta la cámara al marcador (código de barras)
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- Marcador barcode 0 (puedes imprimir el patrón 0 de AR.js) -->
        <a-marker preset="hiro">
            <!-- Tarjeta flotante -->
            <a-plane position="0 0.3 0" width="1.2" height="0.6" color="#1a1a2e" opacity="0.95">
                <a-text value="🎓 TALLER: TECNOLOGÍA INMERSIVA" color="#00aaff" align="center" width="1.8" position="0 0.22 0.01" scale="0.45 0.45 0.45"></a-text>
                <a-text value="📌 Creación de materiales inmersivos accesibles" color="#ffffff" align="center" width="2.0" position="0 0.08 0.01" scale="0.4 0.4 0.4"></a-text>
                <a-text value="🔗 Vincular herramientas con asignaturas" color="#dddddd" align="center" width="2.2" position="0 -0.05 0.01" scale="0.35 0.35 0.35"></a-text>
                <a-text value="❓ ¿Cuándo usar AR y cuándo evitar?" color="#ffaa44" align="center" width="2.2" position="0 -0.18 0.01" scale="0.35 0.35 0.35"></a-text>
            </a-plane>
        </a-marker>
        
        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
