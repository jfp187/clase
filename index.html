<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Taller de Tecnología Inmersiva - AR Experience</title>
    
    <!-- Librerías de AR.js y A-Frame -->
    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.4.0/dist/aframe-master.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
        /* Este estilo muestra un mensaje de carga mientras se prepara la cámara */
        .arjs-loader {
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .arjs-loader div {
            text-align: center;
            font-size: 1.25em;
            color: white;
        }
        /* Instrucciones en pantalla */
        .instructions {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            font-family: Arial, sans-serif;
        }
        @media (min-width: 768px) {
            .instructions { left: auto; right: 20px; top: 20px; bottom: auto; max-width: 280px; text-align: left; }
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">
    
    <!-- Pantalla de carga inicial -->
    <div class="arjs-loader">
        <div>Cargando experiencia AR...<br>Por favor espera</div>
    </div>
    
    <!-- Instrucciones flotantes -->
    <div class="instructions">
        🎯 <strong>¿Cómo funciona?</strong><br>
        1. Apunta la cámara al marcador impreso<br>
        2. Verás la información del taller flotando<br>
        3. Mantén el marcador dentro del encuadre
    </div>

    <!-- Escena principal de AR -->
    <a-scene
        vr-mode-ui="enabled: false;"
        renderer="logarithmicDepthBuffer: true; precision: medium;"
        embedded
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
    >
        
        <!-- ========================================== -->
        <!-- AQUÍ VA TU MARCADOR - ¡MODIFICA ESTA PARTE! -->
        <!-- ========================================== -->
        <!-- Reemplaza 'taller' por el nombre base de tus archivos -->
        <!-- Ejemplo: si tus archivos son 'marcador.fset', pon 'marcador' -->
        <a-nft
            type="nft"
            url="./HIRO"
            smooth="true"
            smoothCount="10"
            smoothTolerance="0.01"
            smoothThreshold="5"
        >
            <!-- ========================================== -->
            <!-- CONTENIDO QUE APARECE SOBRE EL MARCADOR     -->
            <!-- Aquí va toda la información de tu taller    -->
            <!-- ========================================== -->
            
            <!-- Tarjeta principal flotante -->
            <a-plane 
                position="0 0.3 0" 
                width="1.2" 
                height="0.6" 
                color="#1a1a2e"
                opacity="0.95"
                material="side: double"
                rotation="0 0 0"
            >
                <!-- Título principal -->
                <a-text 
                    value="🎓 TALLER: TECNOLOGÍA INMERSIVA EN EDUCACIÓN" 
                    color="#00aaff" 
                    align="center"
                    width="1.8"
                    position="0 0.22 0.01"
                    scale="0.45 0.45 0.45"
                    wrap-count="25"
                >
                </a-text>
                
                <!-- Subtítulo / Actividad -->
                <a-text 
                    value="📌 Creación de materiales inmersivos accesibles" 
                    color="#ffffff" 
                    align="center"
                    width="2.0"
                    position="0 0.08 0.01"
                    scale="0.4 0.4 0.4"
                    wrap-count="30"
                >
                </a-text>
                
                <!-- Punto 2: Vinculación con asignaturas -->
                <a-text 
                    value="🔗 Espacio para vincular herramientas con asignaturas" 
                    color="#dddddd" 
                    align="center"
                    width="2.2"
                    position="0 -0.05 0.01"
                    scale="0.35 0.35 0.35"
                    wrap-count="35"
                >
                </a-text>
                
                <!-- Punto 3: Decisión didáctica -->
                <a-text 
                    value="❓ Decisión didáctica: ¿Cuándo usar AR y cuándo evitar?" 
                    color="#ffaa44" 
                    align="center"
                    width="2.2"
                    position="0 -0.18 0.01"
                    scale="0.35 0.35 0.35"
                    wrap-count="35"
                >
                </a-text>
                
                <!-- Línea decorativa final -->
                <a-text 
                    value="✨ Apunta la cámara al marcador para mantener visible este mensaje ✨" 
                    color="#88aaff" 
                    align="center"
                    width="2.5"
                    position="0 -0.32 0.01"
                    scale="0.25 0.25 0.25"
                    wrap-count="40"
                >
                </a-text>
            </a-plane>
            
            <!-- Elemento decorativo: un anillo flotante que gira -->
            <a-ring 
                radius-outer="0.8" 
                radius-inner="0.7" 
                color="#00aaff" 
                opacity="0.5"
                material="side: double"
                rotation="-90 0 0"
                position="0 0 -0.1"
            >
                <a-animation 
                    attribute="rotation" 
                    from="-90 0 0" 
                    to="-90 360 0" 
                    dur="8000" 
                    repeat="indefinite"
                >
                </a-animation>
            </a-ring>
            
        </a-nft>
        
        <!-- Cámara para tracking -->
        <a-entity camera></a-entity>
        
    </a-scene>

    <script>
        // Esperar a que todo esté cargado y luego ocultar el loader
        window.addEventListener("arjs-nft-loaded", function() {
            var loader = document.querySelector('.arjs-loader');
            if (loader) {
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
